<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>$KIBSHI DUEL</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="api.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Hiragino Sans', sans-serif;
    background: #1a0d2e;
    user-select: none;
    touch-action: manipulation;
  }
  #wrap {
    width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
    position: relative;
  }
  #game {
    display: block;
    max-width: 100%; max-height: 100%;
    background: linear-gradient(180deg, #1a0d2e 0%, #2d1b4e 40%, #4a2766 70%, #6e3a85 100%);
    box-shadow: 0 10px 40px rgba(0,0,0,0.4);
    border-radius: 16px;
    cursor: pointer;
  }
  .overlay {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    pointer-events: none;
    color: #fff;
    opacity: 0; visibility: hidden;
    transition: opacity 0.3s ease, visibility 0.3s ease;
  }
  .overlay.visible { pointer-events: auto; opacity: 1; visibility: visible; }
  .title {
    font-size: clamp(40px, 10vw, 68px);
    font-weight: 900;
    letter-spacing: 0.08em;
    color: #FFD700;
    text-shadow: 0 0 12px #FFD700, 0 0 24px #FF6B00, 0 0 32px #FF6B00;
    margin-bottom: 8px;
    text-align: center;
    font-family: 'Arial Black', sans-serif;
  }
  .subtitle {
    font-size: clamp(13px, 3vw, 17px);
    font-weight: 600;
    color: #FFB6E5;
    margin-bottom: 32px;
    text-shadow: 0 0 8px #FF1493;
  }
  .btn {
    background: linear-gradient(135deg, #FF6B00, #FFD700);
    color: #1a0d2e;
    border: none;
    padding: 16px 40px;
    font-size: clamp(16px, 4vw, 20px);
    font-weight: 900;
    letter-spacing: 0.05em;
    border-radius: 100px;
    box-shadow: 0 0 20px rgba(255, 107, 0, 0.6), 0 6px 20px rgba(0,0,0,0.3);
    cursor: pointer;
    transition: transform 0.1s;
    pointer-events: auto;
  }
  .btn:active { transform: scale(0.96); }
  .btn-row { display: flex; gap: 12px; align-items: center; }
  .btn-secondary {
    background: rgba(255,255,255,0.12);
    color: #fff;
    border: 2px solid rgba(255, 215, 0, 0.4);
    padding: 14px 24px;
    font-size: clamp(14px, 3.5vw, 17px);
    font-weight: 700;
    border-radius: 100px;
    cursor: pointer;
    transition: transform 0.1s;
    pointer-events: auto;
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .btn-secondary:active { transform: scale(0.96); }
  .hint {
    font-size: 13px;
    color: rgba(255,255,255,0.6);
    margin-top: 16px;
  }
  .total-points {
    margin-top: 24px;
    background: rgba(255,255,255,0.1);
    padding: 6px 14px;
    border-radius: 100px;
    font-size: 13px;
    font-weight: 700;
    color: #FFD700;
  }
  .gameover-card {
    background: rgba(30, 15, 50, 0.92);
    padding: 32px 40px;
    border-radius: 24px;
    text-align: center;
    box-shadow: 0 0 40px rgba(255,107,0,0.4), 0 10px 40px rgba(0,0,0,0.6);
    margin-bottom: 24px;
    border: 2px solid rgba(255,215,0,0.4);
    min-width: 280px;
  }
  .gameover-title {
    font-size: clamp(26px, 7vw, 36px);
    color: #FFD700;
    font-weight: 900;
    letter-spacing: 0.05em;
    margin-bottom: 20px;
    text-shadow: 0 0 12px #FFD700;
  }
  .gameover-title.lose { color: #FF4080; text-shadow: 0 0 12px #FF4080; }
  .stats { display: flex; gap: 24px; margin-bottom: 16px; justify-content: center; }
  .stat { display: flex; flex-direction: column; align-items: center; }
  .stat-label {
    font-size: 11px;
    color: rgba(255,255,255,0.6);
    text-transform: uppercase;
    letter-spacing: 0.15em;
  }
  .stat-value {
    font-size: clamp(24px, 5vw, 32px);
    font-weight: 900;
    color: #fff;
  }
  .reaction-row {
    margin-top: 8px;
    font-size: 13px;
    color: rgba(255,255,255,0.85);
  }
  .reaction-row .react-label {
    color: #FFD700;
    font-weight: 700;
  }
  .streak-row {
    margin-top: 12px;
    font-size: 14px;
    color: #FF80B0;
    font-weight: 700;
  }
  .mute-btn {
    position: absolute;
    top: 16px; right: 16px;
    width: 44px; height: 44px;
    border: none;
    border-radius: 50%;
    background: rgba(255,255,255,0.85);
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    font-size: 22px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    z-index: 10;
    transition: transform 0.1s;
    pointer-events: auto;
  }
  .mute-btn:active { transform: scale(0.92); }
  .home-link {
    position: absolute;
    top: 16px; right: 70px;
    width: 44px; height: 44px;
    border: none;
    border-radius: 50%;
    background: rgba(255,255,255,0.85);
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    font-size: 20px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    z-index: 10;
    text-decoration: none;
  }
</style>

<div id="wrap">
  <canvas id="game" width="400" height="700"></canvas>

  <a class="home-link" href="index.html">🏠</a>
  <button class="mute-btn" id="muteBtn">🔊</button>

  <div class="overlay visible" id="startOverlay">
    <div class="title">$KIBSHI<br>DUEL</div>
    <div class="subtitle">⚡ QUICK DRAW SHOWDOWN ⚡</div>
    <button class="btn" id="startBtn">START DUEL</button>
    <div class="hint" style="margin-top: 16px;">FIRE! が出た瞬間にタップ</div>
    <div class="total-points" id="totalPointsStart">Total: 0 pts</div>
  </div>

  <div class="overlay" id="gameOverOverlay">
    <div class="gameover-card">
      <div class="gameover-title" id="gameOverTitle">VICTORY!</div>
      <div class="stats">
        <div class="stat"><div class="stat-label">SCORE</div><div class="stat-value" id="finalScore">0</div></div>
        <div class="stat"><div class="stat-label">BEST</div><div class="stat-value" id="bestReact">-</div></div>
      </div>
      <div class="reaction-row" id="reactionRow"></div>
      <div class="streak-row" id="streakRow"></div>
      <div style="font-size: 13px; color: rgba(255,255,255,0.7); margin-top: 10px;">
        Total: <span id="totalPointsEnd" style="font-weight: 700; color: #FFD700;">0</span> pts
      </div>
    </div>
    <div class="btn-row">
      <a class="btn-secondary" href="index.html">🏠 ホーム</a>
      <button class="btn" id="retryBtn">REMATCH</button>
    </div>
  </div>
</div>

<script>
// ============================================================
// KIBSHI DUEL - Quick-draw laser shootout
// ============================================================

const tg = window.Telegram && window.Telegram.WebApp ? window.Telegram.WebApp : null;
if (tg) {
  try {
    tg.ready(); tg.expand();
    if (tg.setHeaderColor) tg.setHeaderColor('#1a0d2e');
    if (tg.setBackgroundColor) tg.setBackgroundColor('#1a0d2e');
  } catch (e) {}
}

const storage = {
  async get(key) {
    try {
      if (window.storage && typeof window.storage.get === 'function') {
        const r = await window.storage.get(key);
        return r && r.value !== undefined ? r.value : null;
      }
    } catch (e) {}
    try { return localStorage.getItem(key); } catch (e) {}
    return null;
  },
  async set(key, val) {
    try {
      if (window.storage && typeof window.storage.set === 'function') {
        await window.storage.set(key, val); return;
      }
    } catch (e) {}
    try { localStorage.setItem(key, val); } catch (e) {}
  }
};

function haptic(kind) {
  if (tg && tg.HapticFeedback) {
    try {
      if (kind === 'impact') tg.HapticFeedback.impactOccurred('medium');
      else if (kind === 'heavy') tg.HapticFeedback.impactOccurred('heavy');
      else if (kind === 'success') tg.HapticFeedback.notificationOccurred('success');
      else if (kind === 'error') tg.HapticFeedback.notificationOccurred('error');
    } catch (e) {}
  }
}

// ---------- Audio ----------
let audioCtx = null;
let muted = false;
function initAudio() {
  if (audioCtx) {
    // Resume if suspended (e.g., after backgrounding the app)
    if (audioCtx.state === 'suspended') {
      try { audioCtx.resume(); } catch (e) {}
    }
    return;
  }
  try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) {}
}
function playTone({ freq, freqEnd, duration, type = 'sine', volume = 0.2, attack = 0.005 }) {
  if (!audioCtx || muted) return;
  const now = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type;
  osc.frequency.setValueAtTime(freq, now);
  if (freqEnd) osc.frequency.exponentialRampToValueAtTime(Math.max(1, freqEnd), now + duration);
  gain.gain.setValueAtTime(0, now);
  gain.gain.linearRampToValueAtTime(volume, now + attack);
  gain.gain.exponentialRampToValueAtTime(0.001, now + duration);
  osc.connect(gain); gain.connect(audioCtx.destination);
  osc.start(now); osc.stop(now + duration + 0.02);
}
function sfxBeep() {
  playTone({ freq: 440, duration: 0.06, type: 'square', volume: 0.06 });
}
function sfxFire() {
  // Alarm bell
  playTone({ freq: 880, duration: 0.08, type: 'square', volume: 0.18 });
  setTimeout(() => playTone({ freq: 660, duration: 0.15, type: 'square', volume: 0.15 }), 60);
}
function sfxLaser(highPitch = true) {
  // Sci-fi laser zap
  const base = highPitch ? 1800 : 1200;
  playTone({ freq: base, freqEnd: 80, duration: 0.18, type: 'sawtooth', volume: 0.15 });
}
function sfxWin() {
  playTone({ freq: 523, duration: 0.1, type: 'triangle', volume: 0.18 });
  setTimeout(() => playTone({ freq: 659, duration: 0.1, type: 'triangle', volume: 0.18 }), 90);
  setTimeout(() => playTone({ freq: 880, duration: 0.2, type: 'triangle', volume: 0.18 }), 180);
}
function sfxLose() {
  playTone({ freq: 330, freqEnd: 80, duration: 0.4, type: 'sawtooth', volume: 0.18 });
}
function sfxFoul() {
  playTone({ freq: 200, duration: 0.5, type: 'square', volume: 0.2 });
}

const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
function resizeCanvas() {
  const maxW = Math.min(window.innerWidth - 16, 480);
  const maxH = window.innerHeight - 16;
  const ratio = 400 / 700;
  let w = maxW;
  let h = w / ratio;
  if (h > maxH) { h = maxH; w = h * ratio; }
  canvas.style.width = w + 'px';
  canvas.style.height = h + 'px';
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

  ROUND_INTRO: 'round_intro',
  WAITING: 'waiting',

};

// Match state
let round = 1;

let lastSpeedBonus = 0;

// Character positions
const HERO_X = W * 0.19;
const HERO_Y = H * 0.42;

async function loadInitialState() {
  try {
    const b = await storage.get('kibshi_duel_best');
    if (b) bestReactionTime = parseInt(b) || Infinity;
  } catch (e) {}
  try {
    const w = await storage.get('kibshi_duel_wins');
    if (w) totalWins = parseInt(w) || 0;
  } catch (e) {}
  try {
    const s = await storage.get('kibshi_duel_streak');
    if (s) winStreak = parseInt(s) || 0;
  } catch (e) {}
  try {
    const t = await storage.get('kibshi_total_points');
    if (t) totalPoints = parseInt(t) || 0;
  } catch (e) {}
  try {
    const bs = await storage.get('kibshi_duel_best_score');
    if (bs) bestMatchScore = parseInt(bs) || 0;
  } catch (e) {}
  try {
    const m = await storage.get('kibshi_jump_muted');
    if (m === '1') muted = true;
  } catch (e) {}
  const muteBtnEl = document.getElementById('muteBtn');
  if (muteBtnEl) muteBtnEl.textContent = muted ? '🔇' : '🔊';
  botLevel = Math.min(10, Math.floor(totalWins / 3) + 1);
  updateTotalDisplay();
}

async function saveProgress() {
  try {
    if (bestReactionTime !== Infinity) await storage.set('kibshi_duel_best', String(bestReactionTime));
    await storage.set('kibshi_duel_wins', String(totalWins));
    await storage.set('kibshi_duel_streak', String(winStreak));
    await storage.set('kibshi_total_points', String(totalPoints));
    await storage.set('kibshi_duel_best_score', String(bestMatchScore));
  } catch (e) {}
}

// ---------- Server submission [SYNC] ----------
// Called once per match (in matchOver), sending the match's final score.
// Reaction time, win streak, and total wins stay LOCAL-ONLY (gameplay
// flavor data, not score-relevant). Server is source of truth for the
// match score and reward totals; we reconcile after a successful POST.
async function submitScoreToServer(finalMatchScore, durationMs) {
  if (finalMatchScore <= 0) return;
  if (typeof api === 'undefined') return;

  const r = await api.submitScore('duel', finalMatchScore, Math.round(durationMs));
  if (!r.ok) return;  // Silent fallback — localStorage already updated

  const me = await api.me();
  if (!me.ok) return;

  const serverTotal = me.data.total_points.all;
  const serverDuelBest = me.data.personal_bests.duel;

  totalPoints = serverTotal;
  bestMatchScore = serverDuelBest;

  try {
    localStorage.setItem('kibshi_total_points', String(serverTotal));
    localStorage.setItem('kibshi_duel_best_score', String(serverDuelBest));
  } catch (e) {}

  updateTotalDisplay();
}

function updateTotalDisplay() {
  const el1 = document.getElementById('totalPointsStart');
  const el2 = document.getElementById('totalPointsEnd');
  if (el1) el1.textContent = `Total: ${totalPoints} pts`;
  if (el2) el2.textContent = totalPoints;
}

// ---------- Drawing helpers ----------
function drawBackground() {
  // Vertical gradient is set on canvas CSS, but we add stars and grid here
  
  // Star field
  ctx.fillStyle = 'rgba(255, 255, 255, 0.7)';
  const seed = 12345;
  function rand(i) { return ((Math.sin(seed * i * 0.012345) + 1) / 2); }
  for (let i = 1; i < 80; i++) {
    const x = rand(i) * W;
    const y = rand(i + 100) * H * 0.55;
    const size = rand(i + 200) * 1.5 + 0.5;
    const blink = Math.sin((Date.now() * 0.001) + i) * 0.3 + 0.7;
    ctx.globalAlpha = blink * (0.4 + rand(i + 300) * 0.6);
    ctx.fillRect(x, y, size, size);
  }
  ctx.globalAlpha = 1;

  // Horizon grid (Tron-style)
  const horizonY = H * 0.58;
  ctx.strokeStyle = 'rgba(255, 100, 200, 0.4)';
  ctx.lineWidth = 1;
  // Horizon line
  ctx.beginPath();
  ctx.moveTo(0, horizonY);
  ctx.lineTo(W, horizonY);
  ctx.stroke();
  // Perspective lines (radiating from vanishing point)
  const vpX = W / 2;
  ctx.strokeStyle = 'rgba(255, 100, 200, 0.25)';
  for (let i = -6; i <= 6; i++) {
    if (i === 0) continue;
    const startX = vpX + i * 50;
    ctx.beginPath();
    ctx.moveTo(vpX, horizonY);
    ctx.lineTo(startX < 0 ? -50 : (startX > W ? W + 50 : startX), H);
    ctx.stroke();
  }
  // Horizontal grid lines (receding)
  ctx.strokeStyle = 'rgba(255, 215, 0, 0.2)';
  for (let i = 1; i <= 6; i++) {
    const t = i / 6;
    const y = horizonY + Math.pow(t, 2.2) * (H - horizonY);
    ctx.beginPath();
    ctx.moveTo(0, y);
    ctx.lineTo(W, y);
    ctx.stroke();
  }
  
  // Atmospheric glow at horizon
  const glowGrad = ctx.createLinearGradient(0, horizonY - 30, 0, horizonY + 5);
  glowGrad.addColorStop(0, 'rgba(255, 100, 150, 0)');
  glowGrad.addColorStop(1, 'rgba(255, 100, 150, 0.4)');
  ctx.fillStyle = glowGrad;
  ctx.fillRect(0, horizonY - 30, W, 35);
}

function drawKibshiHero(x, y) {
  const s = 50;
  ctx.save();
  ctx.translate(x, y);
  
  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.beginPath();
  ctx.ellipse(0, s * 1.5, s * 0.8, 5, 0, 0, Math.PI * 2);
  ctx.fill();

  // Tail (curled shiba-style, left side - drawn before body so body overlaps inner edge)
  ctx.fillStyle = '#D89A5F';
  ctx.beginPath();
  ctx.arc(-s * 0.50, s * 0.95, s * 0.16, 0, Math.PI * 2);
  ctx.fill();
  // Tail cream tip
  ctx.fillStyle = '#F0C99A';
  ctx.beginPath();
  ctx.arc(-s * 0.55, s * 0.89, s * 0.07, 0, Math.PI * 2);
  ctx.fill();
  
  // Body
  ctx.fillStyle = '#E2A66E';
  ctx.beginPath();
  ctx.ellipse(0, s * 0.85, s * 0.55, s * 0.45, 0, 0, Math.PI * 2);
  ctx.fill();
  // Body shading (subtle depth)
  ctx.fillStyle = 'rgba(170, 100, 50, 0.15)';
  ctx.beginPath();
  ctx.ellipse(0, s * 1.05, s * 0.45, s * 0.22, 0, 0, Math.PI * 2);
  ctx.fill();
  // Belly
  ctx.fillStyle = '#FBE8D0';
  ctx.beginPath();
  ctx.ellipse(0, s * 0.95, s * 0.28, s * 0.32, 0, 0, Math.PI * 2);
  ctx.fill();

  // Front paws (planted, cream)
  ctx.fillStyle = '#FBE8D0';
  ctx.beginPath();
  ctx.ellipse(-s * 0.24, s * 1.27, s * 0.13, s * 0.09, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(s * 0.24, s * 1.27, s * 0.13, s * 0.09, 0, 0, Math.PI * 2);
  ctx.fill();
  
  // Head image (user will provide fixed image with no semi-transparent pixels)
  if (kibshiImgReady) {
    ctx.drawImage(kibshiImg, -s * 0.7, -s * 0.66, s * 1.4, s * 1.31);  // 128:120 aspect ratio
  } else {
    ctx.fillStyle = '#DFA065';
    ctx.beginPath();
    ctx.arc(0, 0, s * 0.6, 0, Math.PI * 2);
    ctx.fill();
  }
  
  // Cowboy hat (small, on top of head)
  ctx.fillStyle = '#8B4513';
  ctx.beginPath();
  ctx.ellipse(0, -s * 0.55, s * 0.65, s * 0.12, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#6B3410';
  ctx.beginPath();
  ctx.ellipse(0, -s * 0.7, s * 0.32, s * 0.22, 0, 0, Math.PI * 2);
  ctx.fill();
  // Hat band
  ctx.fillStyle = '#FFD700';
  ctx.fillRect(-s * 0.3, -s * 0.6, s * 0.6, s * 0.06);
  // Star on hat
  ctx.fillStyle = '#FFF';
  ctx.beginPath();
  drawStar(ctx, 0, -s * 0.58, 5, s * 0.05, s * 0.025);
  ctx.fill();
  
  // Laser gun (in front, pointing right toward bot)
  drawLaserGun(s * 0.5, s * 0.5, 1, '#FFD700', '#FF6B00');
  
  ctx.restore();
}

function roundedRectPath(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

function drawRobotVillain(x, y) {
  const p = getRobotPalette(botLevel);
  const s = 50;
  ctx.save();
  ctx.translate(x, y);

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  ctx.beginPath();
  ctx.ellipse(0, s * 1.5, s * 0.85, 5, 0, 0, Math.PI * 2);
  ctx.fill();

  // Body (boxy metal torso)
  roundedRectPath(ctx, -s * 0.5, s * 0.35, s * 1.0, s * 0.95, s * 0.08);
  ctx.fillStyle = p.body;
  ctx.fill();
  ctx.fillStyle = p.bodyHi;
  roundedRectPath(ctx, -s * 0.5, s * 0.35, s * 1.0, s * 0.18, s * 0.08);
  ctx.fill();
  ctx.fillStyle = 'rgba(0,0,0,0.25)';
  ctx.fillRect(-s * 0.5, s * 1.18, s, s * 0.12);

  // Chest light (pulsing core)
  const chestPulse = 0.55 + Math.sin(Date.now() * 0.004) * 0.3;
  ctx.fillStyle = `rgba(${p.chestRGB}, ${chestPulse})`;
  ctx.shadowColor = p.chestGlow;
  ctx.shadowBlur = 14;
  ctx.beginPath();
  ctx.arc(0, s * 0.78, s * 0.13, 0, Math.PI * 2);
  ctx.fill();
  ctx.shadowBlur = 0;
  ctx.fillStyle = p.chestCore;
  ctx.beginPath();
  ctx.arc(0, s * 0.78, s * 0.06, 0, Math.PI * 2);
  ctx.fill();

  // Bolts
  for (const [bx, by] of [[-s*0.4, s*0.45], [s*0.4, s*0.45], [-s*0.4, s*1.2], [s*0.4, s*1.2]]) {
    ctx.fillStyle = p.bolts;
    ctx.beginPath();
    ctx.arc(bx, by, s * 0.05, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = p.body;
    ctx.beginPath();
    ctx.arc(bx, by, s * 0.02, 0, Math.PI * 2);
    ctx.fill();
  }

  // Neck
  ctx.fillStyle = p.neck;
  ctx.fillRect(-s * 0.14, s * 0.25, s * 0.28, s * 0.14);
  ctx.fillStyle = p.head;
  ctx.fillRect(-s * 0.14, s * 0.25, s * 0.28, s * 0.04);

  // Head
  roundedRectPath(ctx, -s * 0.58, -s * 0.45, s * 1.16, s * 0.75, s * 0.18);
  ctx.fillStyle = p.head;
  ctx.fill();
  ctx.fillStyle = p.bodyHi;
  roundedRectPath(ctx, -s * 0.58, -s * 0.45, s * 1.16, s * 0.15, s * 0.16);
  ctx.fill();

  // Visor
  ctx.fillStyle = p.visor;
  ctx.fillRect(-s * 0.52, -s * 0.18, s * 1.04, s * 0.26);
  ctx.strokeStyle = p.visorBorder;
  ctx.lineWidth = 1;
  ctx.strokeRect(-s * 0.52, -s * 0.18, s * 1.04, s * 0.26);

  // Right LED eye (left is covered by patch)
  const eyeGlowAlpha = 0.75 + Math.sin(Date.now() * 0.006) * 0.25;
  ctx.shadowColor = p.eyeGlow;
  ctx.shadowBlur = 14;
  ctx.fillStyle = `rgba(${p.eyeRGB}, ${eyeGlowAlpha})`;
  ctx.fillRect(s * 0.14, -s * 0.1, s * 0.22, s * 0.1);
  ctx.shadowBlur = 0;
  ctx.fillStyle = p.eyeCore;
  ctx.fillRect(s * 0.18, -s * 0.07, s * 0.14, s * 0.04);

  // Glow leaking from under patch
  ctx.shadowColor = p.eyeGlow;
  ctx.shadowBlur = 6;
  ctx.fillStyle = `rgba(${p.eyeRGB}, ${0.25 + Math.sin(Date.now() * 0.006) * 0.15})`;
  ctx.fillRect(-s * 0.36, -s * 0.1, s * 0.22, s * 0.1);
  ctx.shadowBlur = 0;

  // ----- Pirate eye patch -----
  ctx.fillStyle = '#0a0608';
  ctx.beginPath();
  ctx.ellipse(-s * 0.25, -s * 0.05, s * 0.21, s * 0.17, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = 'rgba(80, 40, 50, 0.7)';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.ellipse(-s * 0.25, -s * 0.05, s * 0.21, s * 0.17, 0, 0, Math.PI * 2);
  ctx.stroke();
  ctx.fillStyle = 'rgba(255,255,255,0.1)';
  ctx.beginPath();
  ctx.ellipse(-s * 0.3, -s * 0.11, s * 0.08, s * 0.04, 0, 0, Math.PI * 2);
  ctx.fill();

  // Patch straps
  ctx.strokeStyle = '#0a0608';
  ctx.lineWidth = 3.5;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(-s * 0.32, -s * 0.2);
  ctx.lineTo(s * 0.58, -s * 0.4);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(-s * 0.15, s * 0.08);
  ctx.lineTo(-s * 0.55, s * 0.14);
  ctx.stroke();

  // ----- Skull-and-crossed-swords insignia on patch -----
  // Center coordinates of insignia
  const sk_cx = -s * 0.25;
  const sk_cy = -s * 0.06;
  const sword_y = sk_cy + s * 0.025;

  // === Crossed swords (drawn first, behind skull) ===
  ctx.strokeStyle = '#FFFFFF';
  ctx.lineWidth = 1.6;
  ctx.lineCap = 'round';
  // Sword 1: upper-left tip → lower-right handle
  ctx.beginPath();
  ctx.moveTo(sk_cx - s * 0.135, sk_cy - s * 0.05);
  ctx.lineTo(sk_cx + s * 0.13, sword_y + s * 0.05);
  ctx.stroke();
  // Sword 2: upper-right tip → lower-left handle
  ctx.beginPath();
  ctx.moveTo(sk_cx + s * 0.135, sk_cy - s * 0.05);
  ctx.lineTo(sk_cx - s * 0.13, sword_y + s * 0.05);
  ctx.stroke();
  // Handle guards (perpendicular cross-piece at handle ends)
  ctx.lineWidth = 1.3;
  // Right handle guard
  ctx.beginPath();
  ctx.moveTo(sk_cx + s * 0.08, sword_y + s * 0.018);
  ctx.lineTo(sk_cx + s * 0.105, sword_y + s * 0.06);
  ctx.stroke();
  // Left handle guard
  ctx.beginPath();
  ctx.moveTo(sk_cx - s * 0.08, sword_y + s * 0.018);
  ctx.lineTo(sk_cx - s * 0.105, sword_y + s * 0.06);
  ctx.stroke();
  // Handle pommels (small knobs at very end)
  ctx.fillStyle = '#FFFFFF';
  ctx.beginPath();
  ctx.arc(sk_cx + s * 0.13, sword_y + s * 0.05, s * 0.012, 0, Math.PI * 2);
  ctx.arc(sk_cx - s * 0.13, sword_y + s * 0.05, s * 0.012, 0, Math.PI * 2);
  ctx.fill();

  // === Skull (drawn on top, centered) ===
  // Cranium
  ctx.fillStyle = '#FFFFFF';
  ctx.beginPath();
  ctx.arc(sk_cx, sk_cy - s * 0.015, s * 0.058, 0, Math.PI * 2);
  ctx.fill();
  // Eye sockets
  ctx.fillStyle = '#0a0608';
  ctx.beginPath();
  ctx.arc(sk_cx - s * 0.020, sk_cy - s * 0.022, s * 0.014, 0, Math.PI * 2);
  ctx.arc(sk_cx + s * 0.020, sk_cy - s * 0.022, s * 0.014, 0, Math.PI * 2);
  ctx.fill();
  // Lower jaw block
  ctx.fillStyle = '#FFFFFF';
  ctx.fillRect(sk_cx - s * 0.032, sk_cy + s * 0.018, s * 0.064, s * 0.020);
  // Teeth gaps
  ctx.fillStyle = '#0a0608';
  ctx.fillRect(sk_cx - s * 0.013, sk_cy + s * 0.020, s * 0.004, s * 0.014);
  ctx.fillRect(sk_cx + s * 0.009, sk_cy + s * 0.020, s * 0.004, s * 0.014);

  // Mouth grille
  ctx.fillStyle = '#1a1528';
  roundedRectPath(ctx, -s * 0.22, s * 0.13, s * 0.44, s * 0.13, s * 0.03);
  ctx.fill();
  ctx.strokeStyle = '#5a5568';
  ctx.lineWidth = 1.5;
  for (let i = 0; i < 5; i++) {
    const lx = -s * 0.18 + i * (s * 0.36 / 4);
    ctx.beginPath();
    ctx.moveTo(lx, s * 0.15);
    ctx.lineTo(lx, s * 0.24);
    ctx.stroke();
  }

  // Antenna (longer so it sticks up clearly above the pirate hat)
  ctx.strokeStyle = '#5a5568';
  ctx.lineWidth = 2.5;
  ctx.beginPath();
  ctx.moveTo(s * 0.3, -s * 0.45);
  ctx.lineTo(s * 0.42, -s * 1.0);
  ctx.stroke();
  const antBlink = (Date.now() % 800) < 500 ? 1 : 0.25;
  ctx.fillStyle = `rgba(${p.antennaRGB}, ${antBlink})`;
  ctx.shadowColor = p.antennaGlow;
  ctx.shadowBlur = 12;
  ctx.beginPath();
  ctx.arc(s * 0.42, -s * 1.06, s * 0.07, 0, Math.PI * 2);
  ctx.fill();
  ctx.shadowBlur = 0;

  // Side ear-vents
  ctx.fillStyle = p.neck;
  ctx.fillRect(-s * 0.6, -s * 0.05, s * 0.05, s * 0.18);
  ctx.fillRect(s * 0.55, -s * 0.05, s * 0.05, s * 0.18);

  // ===== Pirate tricorn hat =====
  // Tier-colored bandana underneath (visible at forehead below the hat)
  ctx.fillStyle = p.hatBand;
  ctx.beginPath();
  ctx.moveTo(-s * 0.55, -s * 0.36);
  ctx.quadraticCurveTo(0, -s * 0.32, s * 0.55, -s * 0.36);
  ctx.lineTo(s * 0.52, -s * 0.42);
  ctx.quadraticCurveTo(0, -s * 0.39, -s * 0.52, -s * 0.42);
  ctx.closePath();
  ctx.fill();

  // Main hat - black with two peaks (bicorne/tricorn silhouette)
  ctx.fillStyle = '#0a0a14';
  ctx.beginPath();
  ctx.moveTo(-s * 0.72, -s * 0.42);
  ctx.quadraticCurveTo(0, -s * 0.36, s * 0.72, -s * 0.42);
  ctx.quadraticCurveTo(s * 0.82, -s * 0.6, s * 0.62, -s * 0.78);
  ctx.quadraticCurveTo(s * 0.45, -s * 0.92, s * 0.3, -s * 0.74);
  ctx.quadraticCurveTo(s * 0.15, -s * 0.66, 0, -s * 0.7);
  ctx.quadraticCurveTo(-s * 0.15, -s * 0.66, -s * 0.3, -s * 0.74);
  ctx.quadraticCurveTo(-s * 0.45, -s * 0.92, -s * 0.62, -s * 0.78);
  ctx.quadraticCurveTo(-s * 0.82, -s * 0.6, -s * 0.72, -s * 0.42);
  ctx.closePath();
  ctx.fill();

  // Hat highlight (subtle top edge gradient)
  ctx.fillStyle = 'rgba(255,255,255,0.08)';
  ctx.beginPath();
  ctx.moveTo(-s * 0.58, -s * 0.76);
  ctx.quadraticCurveTo(-s * 0.45, -s * 0.88, -s * 0.32, -s * 0.74);
  ctx.quadraticCurveTo(-s * 0.16, -s * 0.66, 0, -s * 0.69);
  ctx.quadraticCurveTo(s * 0.16, -s * 0.66, s * 0.32, -s * 0.74);
  ctx.quadraticCurveTo(s * 0.45, -s * 0.88, s * 0.58, -s * 0.76);
  ctx.lineTo(s * 0.46, -s * 0.84);
  ctx.quadraticCurveTo(0, -s * 0.62, -s * 0.46, -s * 0.84);
  ctx.closePath();
  ctx.fill();

  // ===== Skull-and-crossbones insignia on hat front =====
  const hat_cx = 0;
  const hat_cy = -s * 0.55;
  const hat_sw_y = hat_cy + s * 0.022;

  // Crossed bones/swords behind skull
  ctx.strokeStyle = '#FFFFFF';
  ctx.lineWidth = 1.4;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(hat_cx - s * 0.085, hat_cy - s * 0.045);
  ctx.lineTo(hat_cx + s * 0.085, hat_sw_y + s * 0.045);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(hat_cx + s * 0.085, hat_cy - s * 0.045);
  ctx.lineTo(hat_cx - s * 0.085, hat_sw_y + s * 0.045);
  ctx.stroke();
  // Pommels at handle ends
  ctx.fillStyle = '#FFFFFF';
  ctx.beginPath();
  ctx.arc(hat_cx + s * 0.085, hat_sw_y + s * 0.045, s * 0.011, 0, Math.PI * 2);
  ctx.arc(hat_cx - s * 0.085, hat_sw_y + s * 0.045, s * 0.011, 0, Math.PI * 2);
  ctx.fill();

  // Skull cranium
  ctx.fillStyle = '#FFFFFF';
  ctx.beginPath();
  ctx.arc(hat_cx, hat_cy - s * 0.012, s * 0.055, 0, Math.PI * 2);
  ctx.fill();
  // Eye sockets
  ctx.fillStyle = '#0a0a14';
  ctx.beginPath();
  ctx.arc(hat_cx - s * 0.019, hat_cy - s * 0.02, s * 0.013, 0, Math.PI * 2);
  ctx.arc(hat_cx + s * 0.019, hat_cy - s * 0.02, s * 0.013, 0, Math.PI * 2);
  ctx.fill();
  // Lower jaw
  ctx.fillStyle = '#FFFFFF';
  ctx.fillRect(hat_cx - s * 0.030, hat_cy + s * 0.018, s * 0.06, s * 0.019);
  // Teeth gaps
  ctx.fillStyle = '#0a0a14';
  ctx.fillRect(hat_cx - s * 0.012, hat_cy + s * 0.020, s * 0.004, s * 0.013);
  ctx.fillRect(hat_cx + s * 0.008, hat_cy + s * 0.020, s * 0.004, s * 0.013);

  // Arm (raised to match hero gun height)
  ctx.fillStyle = p.body;
  roundedRectPath(ctx, -s * 0.62, s * 0.3, s * 0.16, s * 0.4, s * 0.05);
  ctx.fill();
  ctx.fillStyle = p.bolts;
  ctx.beginPath();
  ctx.arc(-s * 0.54, s * 0.3, s * 0.1, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = p.neck;
  ctx.beginPath();
  ctx.arc(-s * 0.54, s * 0.3, s * 0.05, 0, Math.PI * 2);
  ctx.fill();

  // Laser gun - tier-colored (raised to match hero)
  drawLaserGun(-s * 0.5, s * 0.5, -1, p.hatBand, p.eyeGlow);

  ctx.restore();
}

function drawLaserGun(x, y, dir, color1, color2) {
  // dir = 1 for right-pointing, -1 for left-pointing
  ctx.save();
  ctx.translate(x, y);
  if (dir < 0) ctx.scale(-1, 1);
  
  // Grip
  ctx.fillStyle = '#2a1a3a';
  ctx.fillRect(-2, -2, 8, 14);
  
  // Body (barrel base)
  ctx.fillStyle = '#444';
  ctx.fillRect(-2, -6, 18, 8);
  // Highlight
  ctx.fillStyle = '#777';
  ctx.fillRect(-2, -6, 18, 2);
  
  // Energy chamber (color tube)
  const grad = ctx.createLinearGradient(2, -5, 14, -5);
  grad.addColorStop(0, color2);
  grad.addColorStop(0.5, color1);
  grad.addColorStop(1, color2);
  ctx.fillStyle = grad;
  ctx.fillRect(2, -4, 12, 4);
  
  // Glow tip
  ctx.shadowColor = color1;
  ctx.shadowBlur = 8;
  ctx.fillStyle = color1;
  ctx.fillRect(16, -3, 4, 2);
  ctx.shadowBlur = 0;
  
  ctx.restore();
}

function drawStar(ctx, cx, cy, spikes, outerR, innerR) {
  let rot = -Math.PI / 2;
  const step = Math.PI / spikes;
  ctx.moveTo(cx + Math.cos(rot) * outerR, cy + Math.sin(rot) * outerR);
  for (let i = 0; i < spikes; i++) {
    rot += step;
    ctx.lineTo(cx + Math.cos(rot) * innerR, cy + Math.sin(rot) * innerR);
    rot += step;
    ctx.lineTo(cx + Math.cos(rot) * outerR, cy + Math.sin(rot) * outerR);
  }
  ctx.closePath();
}

// ---------- Match indicator (centered, no overlap) ----------
const BANDIT_RANKS = [
  'NEWBIE',      // Lv 1
  'ROOKIE',      // Lv 2
  'OUTLAW',      // Lv 3
  'GUNSLINGER',  // Lv 4
  'SHARPSHOOTER',// Lv 5
  'MARKSMAN',    // Lv 6
  'VETERAN',     // Lv 7
  'ELITE',       // Lv 8
  'MASTER',      // Lv 9
  'LEGEND',      // Lv 10
];
function getBanditRank() { return BANDIT_RANKS[Math.min(botLevel - 1, 9)]; }

function drawMatchIndicator() {
  const playerColor = '#FFD700';
  const botColor = '#FF4080';

  // Row 1 (y=20): "ROUND 1 / 3" centered, streak on left if any
  ctx.fillStyle = 'rgba(255,255,255,0.7)';
  ctx.font = 'bold 11px -apple-system, sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(`ROUND ${round} / 3`, W / 2, 20);

  // Row 2 (y=42): centered win dots with separator
  const dotY = 42;
  const center = W / 2;
  // Player dots: positions to the LEFT of center (closer to center = first win)
  for (let i = 0; i < 2; i++) {
    const cx = center - 22 - i * 18;
    ctx.beginPath();
    ctx.arc(cx, dotY, 6, 0, Math.PI * 2);
    if (i < playerWins) {
      ctx.fillStyle = playerColor;
      ctx.shadowColor = playerColor;
      ctx.shadowBlur = 10;
      ctx.fill();
      ctx.shadowBlur = 0;
    } else {
      ctx.strokeStyle = 'rgba(255,215,0,0.35)';
      ctx.lineWidth = 1.5;
      ctx.stroke();
    }
  }
  // Center separator bar
  ctx.fillStyle = 'rgba(255,255,255,0.4)';
  ctx.fillRect(center - 1.5, dotY - 7, 3, 14);
  // Bandit dots to the RIGHT of center
  for (let i = 0; i < 2; i++) {
    const cx = center + 22 + i * 18;
    ctx.beginPath();
    ctx.arc(cx, dotY, 6, 0, Math.PI * 2);
    if (i < botWins) {
      ctx.fillStyle = botColor;
      ctx.shadowColor = botColor;
      ctx.shadowBlur = 10;
      ctx.fill();
      ctx.shadowBlur = 0;
    } else {
      ctx.strokeStyle = 'rgba(255,64,128,0.35)';
      ctx.lineWidth = 1.5;
      ctx.stroke();
    }
  }

  // Row 3 (y=60): bandit rank (small, descriptive)
  ctx.fillStyle = 'rgba(255,255,255,0.55)';
  ctx.font = '10px -apple-system, sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText(`vs Lv ${botLevel} ${getBanditRank()} BANDIT`, W / 2, 62);
}

// ---------- State-specific text overlays ----------
function drawCenterText(text, size, color, glowColor, y = H * 0.72) {
  ctx.save();
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.font = `900 ${size}px Arial Black, sans-serif`;
  ctx.shadowColor = glowColor;
  ctx.shadowBlur = 20;
  ctx.fillStyle = color;
  ctx.fillText(text, W / 2, y);
  ctx.shadowBlur = 0;
  ctx.restore();
}

function drawSubText(text, size, color, y = H * 0.82) {
  ctx.save();
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.font = `bold ${size}px -apple-system, sans-serif`;
  ctx.fillStyle = color;
  ctx.fillText(text, W / 2, y);
  ctx.restore();
}

// ---------- Particles ----------
function spawnHitParticles(x, y, color) {
  // Spawn 12 particles in a downward-biased arc (avoid covering character faces)
  for (let i = 0; i < 12; i++) {
    // Bias angle downward: -30 to 210 degrees (excludes straight-up cone)
    const angle = (Math.PI * -0.17) + Math.random() * (Math.PI * 1.34);
    const speed = 3 + Math.random() * 3;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 18 + Math.random() * 10,  // shorter (was 30-45)
      maxLife: 18,
      color,
      size: 2 + Math.random() * 1.5,  // smaller (was 3-5)
    });
  }
}
function updateParticles() {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy; p.vy += 0.35; p.life--;  // stronger gravity
    if (p.life <= 0) particles.splice(i, 1);
  }
}
function drawParticles() {
  for (const p of particles) {
    ctx.fillStyle = p.color;
    ctx.globalAlpha = Math.min(1, p.life / p.maxLife);
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

// ---------- Laser beam ----------
function drawLaserBeam(beam) {
  const lifeFrac = beam.life / beam.maxLife;
  const thickness = (4 + 6 * lifeFrac);
  ctx.save();
  ctx.shadowColor = beam.color;
  ctx.shadowBlur = 20;
  ctx.strokeStyle = beam.color;
  ctx.lineWidth = thickness;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(beam.fromX, beam.fromY);
  ctx.lineTo(beam.toX, beam.toY);
  ctx.stroke();
  // Inner core white
  ctx.shadowBlur = 0;
  ctx.strokeStyle = '#FFFFFF';
  ctx.lineWidth = thickness * 0.4;
  ctx.stroke();
  ctx.restore();
}

// ---------- Match flow ----------
function getBotReactionTime() {
  const baseTimes = [700, 600, 520, 460, 410, 370, 340, 310, 280, 250];
  const variances = [120, 110, 100, 90, 80, 70, 60, 55, 50, 45];
  const idx = Math.min(botLevel - 1, 9);
  return baseTimes[idx] + (Math.random() - 0.5) * variances[idx] * 2;
}

function startMatch() {
  state = STATE.ROUND_INTRO;
  matchStartTime = performance.now();  // [SYNC] Track for duration_ms
  round = 1;
  playerWins = 0;
  botWins = 0;
  matchScore = 0;
  lastReactionTime = null;
  lastBotReactionTime = null;
  particles = [];
  laserBeam = null;
  document.getElementById('startOverlay').classList.remove('visible');
  document.getElementById('gameOverOverlay').classList.remove('visible');
  startRoundIntro();
}

function startRoundIntro() {
  state = STATE.ROUND_INTRO;
  stateChangedAt = Date.now();
  laserBeam = null;
  particles = [];  // clear lingering particles before next round
  setTimeout(() => {
    if (state === STATE.ROUND_INTRO) startWaiting();
  }, 1200);
}

function startWaiting() {
  state = STATE.WAITING;
  stateChangedAt = Date.now();
  const delay = 1200 + Math.random() * 2200;
  waitingTimeoutId = setTimeout(fireSignal, delay);
}

function fireSignal() {
  state = STATE.FIRE;
  stateChangedAt = Date.now();
  fireTime = performance.now();
  playerTapTime = null;
  botTapTime = null;
  sfxFire();
  shakeAmount = 6;
  // Schedule bot tap
  const botReact = getBotReactionTime();
  botTimeoutId = setTimeout(() => {
    if (state === STATE.FIRE && botTapTime === null) {
      botTapTime = performance.now();
      determineWinner();
    }
  }, botReact);
}

function onPlayerTap() {
  if (state === STATE.READY) {
    initAudio();
    startMatch();
    return;
  }
  if (state === STATE.WAITING) {
    clearTimeout(waitingTimeoutId);
    handleFalseStart();
    return;
  }
  if (state === STATE.FIRE && playerTapTime === null) {
    playerTapTime = performance.now();
    determineWinner();
    return;
  }
  if (state === STATE.RESULT) {
    // Auto-progress, ignore additional taps
    return;
  }
}

function handleFalseStart() {
  clearTimeout(botTimeoutId);
  state = STATE.RESULT;
  stateChangedAt = Date.now();
  botWins++;
  lastReactionTime = null;
  lastBotReactionTime = null;
  lastRoundResult = 'foul';
  sfxFoul();
  haptic('error');
  // Villain shoots while hero is still fumbling
  setTimeout(() => {
    if (state === STATE.RESULT) {
      laserBeam = { fromX: BOT_X - 45, fromY: BOT_Y + 23, toX: HERO_X, toY: BOT_Y + 23, life: 25, maxLife: 25, color: '#FF1493' };
      spawnHitParticles(HERO_X, BOT_Y + 23, '#FF1493');
      shakeAmount = 10;
      sfxLaser(false);
    }
  }, 600);
  const isMatchEnd2 = (botWins >= 2);
  setTimeout(continueAfterResult, isMatchEnd2 ? 700 : 1500);
}

function determineWinner() {
  clearTimeout(botTimeoutId);
  state = STATE.RESULT;
  stateChangedAt = Date.now();
  
  const playerTime = playerTapTime !== null ? playerTapTime - fireTime : Infinity;
  const botTime = botTapTime !== null ? botTapTime - fireTime : Infinity;
  
  if (playerTime < botTime) {
    // Player wins round
    playerWins++;
    lastReactionTime = Math.round(playerTime);
    lastBotReactionTime = botTime === Infinity ? null : Math.round(botTime);
    lastRoundResult = 'win';
    if (lastReactionTime < bestReactionTime) bestReactionTime = lastReactionTime;
    
    // Round score: small base + small level bonus + small speed bonus
    const baseScore = 4;
    const levelBonus = (botLevel - 1) * 1;
    let speedBonus = 0;
    if (playerTime < 200) speedBonus = 4;
    else if (playerTime < 300) speedBonus = 2;
    const roundScore = baseScore + levelBonus + speedBonus;
    matchScore += roundScore;
    lastRoundScore = roundScore;
    lastLevelBonus = levelBonus;
    lastSpeedBonus = speedBonus;
    
    sfxWin();
    haptic('success');
    
    // Hero shoots villain
    setTimeout(() => {
      if (state === STATE.RESULT) {
        laserBeam = { fromX: HERO_X + 45, fromY: HERO_Y + 23, toX: BOT_X, toY: HERO_Y + 23, life: 25, maxLife: 25, color: '#FFD700' };
        spawnHitParticles(BOT_X, HERO_Y + 23, '#FFD700');
        shakeAmount = 8;
        sfxLaser(true);
      }
    }, 300);
  } else {
    // Bot wins round
    botWins++;
    lastReactionTime = playerTime === Infinity ? null : Math.round(playerTime);
    lastBotReactionTime = Math.round(botTime);
    lastRoundResult = 'lose';
    sfxLose();
    haptic('error');
    
    // Villain shoots hero
    setTimeout(() => {
      if (state === STATE.RESULT) {
        laserBeam = { fromX: BOT_X - 45, fromY: BOT_Y + 23, toX: HERO_X, toY: BOT_Y + 23, life: 25, maxLife: 25, color: '#FF1493' };
        spawnHitParticles(HERO_X, BOT_Y + 23, '#FF1493');
        shakeAmount = 8;
        sfxLaser(false);
      }
    }, 300);
  }
  const isMatchEnd = (playerWins >= 2 || botWins >= 2);
  setTimeout(continueAfterResult, isMatchEnd ? 700 : 2000);
}

function continueAfterResult() {
  if (playerWins >= 2 || botWins >= 2) {
    matchOver();
  } else {
    round++;
    startRoundIntro();
  }
}

async function matchOver() {
  state = STATE.MATCH_OVER;
  
  const isWin = playerWins >= 2;
  let titleText = isWin ? 'VICTORY!' : 'DEFEAT';
  let streakMessage = '';
  
  // Save OLD botLevel for the bonus display (since we faced this level, not the new one)
  const foughtBotLevel = botLevel;
  const foughtRankName = getBanditRank();
  
  if (isWin) {
    const matchWinBonus = 5 + Math.floor((botLevel - 1) ** 2 * 0.5);
    let bonus = matchWinBonus;
    if (botWins === 0) {
      bonus += 5; // sweep
      titleText = 'PERFECT VICTORY!';
    }
    matchScore += bonus;
    totalWins++;
    winStreak++;
    if (winStreak === 5) { matchScore += 5; streakMessage = '🎯 5 WIN STREAK! +5'; }
    else if (winStreak === 10) { matchScore += 15; streakMessage = '🔥 10 WIN STREAK! +15'; }
    else if (winStreak >= 15 && winStreak % 5 === 0) { matchScore += 15; streakMessage = `🔥🔥 ${winStreak} STREAK! +15`; }
    else if (winStreak > 1) streakMessage = `${winStreak} win streak!`;
    botLevel = Math.min(10, Math.floor(totalWins / 3) + 1);
  } else {
    winStreak = 0;
  }
  
  if (matchScore > bestMatchScore) bestMatchScore = matchScore;
  totalPoints += matchScore;
  await saveProgress();
  updateTotalDisplay();

  // [SYNC] Send match score to server (fire-and-forget; failures fall
  // back to localStorage so UX stays smooth)
  const matchDurationMs = performance.now() - matchStartTime;
  submitScoreToServer(matchScore, matchDurationMs);
  
  // Update UI
  const titleEl = document.getElementById('gameOverTitle');
  titleEl.textContent = titleText;
  titleEl.classList.toggle('lose', !isWin);
  
  document.getElementById('finalScore').textContent = matchScore;
  document.getElementById('bestReact').textContent = bestReactionTime === Infinity ? '-' : `${bestReactionTime}ms`;
  
  const reactionRow = document.getElementById('reactionRow');
  if (lastReactionTime !== null) {
    const label = reactionLabel(lastReactionTime);
    let extras = '';
    if (isWin) {
      // Use the bot level we ACTUALLY fought (before any level-up from this win)
      const levelBonusTotal = (foughtBotLevel - 1) * 2 + Math.floor((foughtBotLevel - 1) ** 2 * 0.5);  // (Lv-1)*1 * 2 rounds + quadratic match Lv
      if (levelBonusTotal > 0) {
        extras = `<br><span style="color:#FFB6E5; font-size:12px;">vs Lv ${foughtBotLevel} ${foughtRankName} → +${levelBonusTotal} bonus</span>`;
      }
    }
    reactionRow.innerHTML = `Last reaction: <span class="react-label">${lastReactionTime}ms</span> ${label}${extras}`;
  } else {
    reactionRow.innerHTML = '';
  }
  
  document.getElementById('streakRow').textContent = streakMessage;
  
  setTimeout(() => document.getElementById('gameOverOverlay').classList.add('visible'), 100);
}

function reactionLabel(ms) {
  if (ms < 200) return '⚡ LIGHTNING!';
  if (ms < 300) return '🔥 FAST!';
  if (ms < 400) return '👍 GOOD';
  if (ms < 500) return 'OK';
  return 'SLOW...';
}

// ---------- Input ----------
canvas.addEventListener('mousedown', () => onPlayerTap());
canvas.addEventListener('touchstart', (e) => { e.preventDefault(); onPlayerTap(); }, { passive: false });
document.addEventListener('keydown', (e) => {
  if (e.code === 'Space' && !e.repeat) { e.preventDefault(); onPlayerTap(); }
});

document.getElementById('startBtn').addEventListener('click', () => {
  initAudio();
  startMatch();
});
document.getElementById('retryBtn').addEventListener('click', () => {
  initAudio();
  startMatch();
});

const muteBtn = document.getElementById('muteBtn');
muteBtn.addEventListener('click', async () => {
  muted = !muted;
  muteBtn.textContent = muted ? '🔇' : '🔊';
  try { await storage.set('kibshi_jump_muted', muted ? '1' : '0'); } catch (e) {}
});

// ---------- Main loop ----------
function update() {
  if (state === STATE.WAITING) {
    // Periodic ready beep
    if (Math.random() < 0.005) sfxBeep();
  }
  if (laserBeam) {
    laserBeam.life--;
    if (laserBeam.life <= 0) laserBeam = null;
  }
  updateParticles();
  if (shakeAmount > 0) shakeAmount -= 0.4;
}

function render() {
  ctx.save();
  // Screen shake
  if (shakeAmount > 0) {
    ctx.translate((Math.random() - 0.5) * shakeAmount, (Math.random() - 0.5) * shakeAmount);
  }
  ctx.clearRect(-20, -20, W + 40, H + 40);
  drawBackground();
  
  if (state !== STATE.READY) drawMatchIndicator();
  
  // Characters
  drawKibshiHero(HERO_X, HERO_Y);
  drawRobotVillain(BOT_X, BOT_Y);
  
  // VS text between
  if (state === STATE.ROUND_INTRO || state === STATE.WAITING) {
    ctx.save();
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.font = 'bold 22px Arial Black, sans-serif';
    ctx.fillStyle = '#FFD700';
    ctx.shadowColor = '#FF6B00';
    ctx.shadowBlur = 8;
    ctx.fillText('VS', W / 2, HERO_Y + 25);
    ctx.restore();
  }
  
  // Laser beam
  if (laserBeam) drawLaserBeam(laserBeam);
  drawParticles();
  
  // State text
  if (state === STATE.ROUND_INTRO) {
    drawCenterText(`ROUND ${round}`, 44, '#FFD700', '#FF6B00');
  } else if (state === STATE.WAITING) {
    drawCenterText('READY...', 40, '#FFB6E5', '#FF1493');
    drawSubText('FIRE! が出るまで待て', 13, 'rgba(255,255,255,0.6)');
  } else if (state === STATE.FIRE) {
    drawCenterText('🔥 FIRE!', 60, '#FFD700', '#FF6B00');
    drawSubText('TAP NOW!', 16, '#FFFFFF');
  } else if (state === STATE.RESULT) {
    if (lastRoundResult === 'win') {
      drawCenterText('WIN!', 48, '#FFD700', '#FF6B00');
      if (lastReactionTime !== null) {
        drawSubText(`${lastReactionTime}ms  ${reactionLabel(lastReactionTime)}`, 16, '#FFD700');
      }
    } else if (lastRoundResult === 'lose') {
      drawCenterText('LOST', 48, '#FF4080', '#FF1493');
      if (lastReactionTime !== null && lastBotReactionTime !== null) {
        drawSubText(`You: ${lastReactionTime}ms / Bot: ${lastBotReactionTime}ms`, 14, 'rgba(255,255,255,0.8)');
      } else if (lastBotReactionTime !== null) {
        drawSubText(`Bot fired in ${lastBotReactionTime}ms`, 14, 'rgba(255,255,255,0.8)');
      }
    } else if (lastRoundResult === 'foul') {
      drawCenterText('FOUL!', 48, '#FF4080', '#FF1493');
      drawSubText('フライング - 失格', 16, '#FFB6E5');
    }
  }
  
  ctx.restore();
}

function loop() {
  update();
  render();
  requestAnimationFrame(loop);
}

loadInitialState();
loop();
</script>
